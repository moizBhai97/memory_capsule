# Open Memory Capsule - Default Configuration
# Copy to config.local.yaml and edit. config.local.yaml is gitignored.
#
# Provider format: "provider/model"
#
# Examples:
#   llm:
#     model: "ollama/phi3.5:latest"        # local, free
#     model: "openai/gpt-4o-mini"          # OpenAI
#     model: "anthropic/claude-haiku-4-5-20251001"  # Anthropic
#     model: "groq/llama-3.1-8b-instant"   # Groq (fast + free tier)
#     model: "gemini/gemini-2.0-flash"     # Google Gemini
#     model: "openai-compatible/my-model"  # any OpenAI-compatible endpoint
#       base_url: "http://my-server:8080/v1"
#       api_key: "..."

llm:
  model: "ollama/phi3.5:latest"
  device: "auto"                # auto | cpu | gpu  (local providers only)
  # base_url: ""               # override endpoint (openai-compatible providers)
  # api_key: ""                # set via env var instead (OPENAI_API_KEY etc.)

# Embedding model — defaults to same provider as LLM when possible.
# Groq and Anthropic don't offer embeddings, so they fall back to Ollama.
# Uncomment to override:
# embed:
#   model: "ollama/nomic-embed-text:latest"
#   model: "openai/text-embedding-3-small"
#   model: "gemini/text-embedding-004"

transcribe:
  model: "whisper/small"        # whisper/tiny | whisper/base | whisper/small | whisper/medium
  # model: "openai/gpt-4o-mini-transcribe"
  # model: "gemini/gemini-2.0-flash"
  device: "auto"                # auto | cpu | cuda  (whisper only)
  language: null                # null = auto-detect

storage:
  sqlite_path: "./data/capsules.db"
  chroma_path: "./data/chroma"
  uploads_path: "./data/uploads"

api:
  host: "0.0.0.0"
  port: 8000
  cors_origins: ["*"]

integrations:
  # --- Auto-capture (zero effort after first setup) ---

  whatsapp_enabled: false              # Personal WhatsApp via whatsapp-web.js

  whatsapp_business_enabled: false     # WhatsApp Business API

  telegram_enabled: false              # Telegram userbot (all chats)
  telegram_session_path: "./data/telegram_session"

  email_enabled: false                 # IMAP (Gmail, Outlook, Yahoo, any)
  email_use_ssl: true
  email_folder: "INBOX"

  zoom_enabled: false
  zoom_recordings_path: ""            # e.g. ~/Documents/Zoom

  slack_enabled: false
  # slack_bot_token and slack_app_token via MC_SLACK_BOT_TOKEN / MC_SLACK_APP_TOKEN env vars

  discord_enabled: false

  # --- File system watchers ---
  watch_downloads: true               # auto-watch your Downloads folder
  watch_screenshots: true             # auto-watch your Screenshots folder
  watch_folders: []                   # extra folders to watch

debug: false
