<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Memory Capsule Settings</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 480px;
      margin: 40px auto;
      padding: 0 20px;
      color: #2d3748;
    }
    h1 { font-size: 20px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 16px;
    }
    input:focus { outline: none; border-color: #4299e1; }
    .hint { font-size: 12px; color: #718096; margin-top: -12px; margin-bottom: 16px; }
    button {
      background: #4299e1;
      color: white;
      border: none;
      padding: 9px 20px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
    }
    #saved { color: #38a169; font-size: 13px; margin-left: 10px; display: none; }
  </style>
</head>
<body>
  <h1>🧠 Memory Capsule Settings</h1>

  <label for="api-url">Server URL</label>
  <input type="text" id="api-url" placeholder="http://localhost:8000" />
  <p class="hint">URL of your running Memory Capsule instance.</p>

  <label for="api-key">API Key (optional)</label>
  <input type="password" id="api-key" placeholder="Leave empty if no auth configured" />
  <p class="hint">Only needed if you set MC_API_KEY in your config.</p>

  <button id="save">Save Settings</button>
  <span id="saved">Saved!</span>

  <script src="options.js"></script>
</body>
</html>
