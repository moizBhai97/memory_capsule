name: Bug report
description: Report a reproducible problem
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail so we can reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect and what actually happened?
      placeholder: Expected X, but got Y.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Project version / commit
      placeholder: main @ <commit-hash>
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: 3.11.8
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows
        - macOS
        - Linux
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs and traceback
      render: shell
